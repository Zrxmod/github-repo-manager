<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repo Manager - Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2d3748;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            opacity: 0.95;
            font-size: 1.1em;
        }

        .content {
            padding: 30px;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #2d3748;
            margin: 30px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .auth-section {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        input[type="password"],
        input[type="text"],
        select {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: white;
        }

        input[type="password"],
        input[type="text"] {
            flex: 1;
            min-width: 200px;
        }

        input[type="password"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
            padding: 8px 16px;
            font-size: 0.85em;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .btn-danger {
            background: #fc5c65;
            color: white;
            padding: 8px 16px;
            font-size: 0.85em;
        }

        .btn-danger:hover {
            background: #e53935;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8em;
        }

        .user-info {
            background: white;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            border: 2px solid #e2e8f0;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e2e8f0;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-details h3 {
            color: #2d3748;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .user-details p {
            color: #718096;
            font-size: 0.9em;
        }

        .status-message {
            padding: 16px;
            border-radius: 6px;
            margin: 20px 0;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-message.show {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #fc5c65;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        .filters-section {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .filter-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
        }

        .filter-item label {
            font-size: 0.9em;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .filter-item input,
        .filter-item select {
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            color: #718096;
            font-weight: 500;
        }

        .repos-container {
            display: grid;
            gap: 15px;
        }

        .repo-card {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            background: white;
            transition: all 0.3s ease;
        }

        .repo-card:hover {
            border-color: #667eea;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.15);
        }

        .repo-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .repo-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .repo-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #2d3748;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 600;
        }

        .badge.public {
            background: #c3dafe;
            color: #1e40af;
        }

        .badge.private {
            background: #fed7d7;
            color: #9b2c2c;
        }

        .badge.language {
            background: #e6f3ff;
            color: #1a73e8;
        }

        .repo-description {
            color: #718096;
            margin-bottom: 12px;
            line-height: 1.5;
            font-size: 0.95em;
        }

        .repo-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #a0aec0;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .repo-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 30px 0;
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .repo-count {
            font-size: 0.95em;
            color: #718096;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 20px;
            }

            .filter-group {
                grid-template-columns: 1fr;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            .repo-header {
                flex-direction: column;
            }

            .controls-bar {
                flex-direction: column;
                align-items: stretch;
            }

            input[type="text"],
            input[type="password"],
            select {
                width: 100%;
            }

            .input-row {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .user-info {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚡ GitHub Repository Manager</h1>
        <p>Professional repository management</p>
    </div>

    <div class="content">
        <!-- Authentication Section -->
        <div class="section-title">🔐 Authentication</div>
        
        <div class="auth-section">
            <div class="input-row">
                <input type="password" id="token" placeholder="Enter GitHub Personal Access Token (PAT)">
                <button class="btn-primary" onclick="loginWithToken()">Login</button>
                <button class="btn-secondary" onclick="logout()">Logout</button>
            </div>

            <p style="font-size: 0.85em; color: #718096; margin-top: 10px;">
                💡 Create a PAT at <a href="https://github.com/settings/tokens" target="_blank" style="color: #667eea; text-decoration: none;"><strong>github.com/settings/tokens</strong></a> with <code>repo</code> scope
            </p>

            <div id="userInfo" style="display: none; margin-top: 15px;">
                <div class="user-info">
                    <div class="user-avatar">
                        <img id="userAvatar" src="" alt="Avatar">
                    </div>
                    <div class="user-details">
                        <h3 id="userName"></h3>
                        <p id="userStats"></p>
                    </div>
                </div>
            </div>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <!-- Statistics Section -->
        <div id="statsSection" style="display: none;">
            <div class="section-title">📊 Statistics</div>
            <div class="stats-container" id="statsContainer"></div>
        </div>

        <div class="divider" id="divider1" style="display: none;"></div>

        <!-- Create Repository Section -->
        <div id="createSection" style="display: none;">
            <div class="section-title">➕ Create New Repository</div>
            
            <div class="input-row">
                <input type="text" id="repoName" placeholder="Repository name">
                <input type="text" id="repoDesc" placeholder="Description (optional)">
                <select id="repoPrivate">
                    <option value="false">🌐 Public</option>
                    <option value="true">🔒 Private</option>
                </select>
                <button class="btn-primary" onclick="createRepo()">Create</button>
            </div>
        </div>

        <div class="divider" id="divider2" style="display: none;"></div>

        <!-- Filters Section -->
        <div id="filtersSection" style="display: none;">
            <div class="section-title">🔍 Search & Filter</div>
            
            <div class="filters-section">
                <div class="filter-group">
                    <div class="filter-item">
                        <label>Search</label>
                        <input type="text" id="searchInput" placeholder="Search repositories...">
                    </div>

                    <div class="filter-item">
                        <label>Type</label>
                        <select id="filterType">
                            <option value="">All Types</option>
                            <option value="public">Public Only</option>
                            <option value="private">Private Only</option>
                        </select>
                    </div>

                    <div class="filter-item">
                        <label>Language</label>
                        <select id="filterLanguage">
                            <option value="">All Languages</option>
                        </select>
                    </div>

                    <div class="filter-item">
                        <label>Sort By</label>
                        <select id="sortBy">
                            <option value="updated">Last Updated</option>
                            <option value="created">Recently Created</option>
                            <option value="name">Name (A-Z)</option>
                            <option value="stars">Most Stars</option>
                            <option value="size">Largest Size</option>
                        </select>
                    </div>
                </div>

                <div class="filter-buttons">
                    <button class="btn-secondary btn-small" onclick="applyFilters()">Apply Filters</button>
                    <button class="btn-secondary btn-small" onclick="resetFilters()">Reset</button>
                </div>
            </div>
        </div>

        <!-- Repositories Section -->
        <div id="reposSection" style="display: none;">
            <div class="section-title">📦 Repositories</div>
            
            <div class="controls-bar">
                <span class="repo-count" id="repoCount">0 repositories</span>
                <button class="btn-secondary btn-small" onclick="refreshRepos()">🔄 Refresh</button>
            </div>

            <div id="reposContainer" class="repos-container"></div>
        </div>

        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">👉</div>
            <p>Login with your GitHub token to manage repositories</p>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:5000/api';
    
    let currentToken = null;
    let allRepos = [];
    let filteredRepos = [];

    // Status message
    function showStatus(message, type = 'info', duration = 5000) {
        const el = document.getElementById('statusMessage');
        el.className = `status-message show ${type}`;
        el.innerText = message;
        
        if (duration) {
            setTimeout(() => el.classList.remove('show'), duration);
        }
    }

    // API Request Helper
    async function apiRequest(endpoint, method = 'POST', body = null) {
        try {
            const config = {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };

            if (body) {
                if (method === 'POST' || method === 'PUT') {
                    config.body = JSON.stringify(body);
                }
            }

            const response = await fetch(`${API_URL}${endpoint}`, config);
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'API Error');
            }

            return data;
        } catch (error) {
            showStatus(`❌ ${error.message}`, 'error');
            return null;
        }
    }

    // Login with token
    async function loginWithToken() {
        const token = document.getElementById('token').value.trim();

        if (!token) {
            showStatus('❌ Please enter your GitHub token', 'error');
            return;
        }

        showStatus('Verifying token...', 'info', 0);

        const result = await apiRequest('/auth/verify', 'POST', { token });

        if (result && result.success) {
            currentToken = token;
            
            // Show user info
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userName').textContent = result.user.name || result.user.login;
            document.getElementById('userAvatar').src = result.user.avatar_url;
            document.getElementById('userStats').textContent = `${result.user.public_repos} public repos • ${result.user.followers} followers`;

            // Show sections
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('statsSection').style.display = 'block';
            document.getElementById('createSection').style.display = 'block';
            document.getElementById('filtersSection').style.display = 'block';
            document.getElementById('reposSection').style.display = 'block';
            document.getElementById('divider1').style.display = 'block';
            document.getElementById('divider2').style.display = 'block';

            showStatus('✅ Login successful!', 'success', 3000);
            loadAllData();
        }
    }

    // Logout
    function logout() {
        currentToken = null;
        document.getElementById('token').value = '';
        document.getElementById('userInfo').style.display = 'none';
        
        allRepos = [];
        filteredRepos = [];
        
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('statsSection').style.display = 'none';
        document.getElementById('createSection').style.display = 'none';
        document.getElementById('filtersSection').style.display = 'none';
        document.getElementById('reposSection').style.display = 'none';
        document.getElementById('divider1').style.display = 'none';
        document.getElementById('divider2').style.display = 'none';
        
        showStatus('Logged out', 'info', 2000);
    }

    // Load all data
    async function loadAllData() {
        showStatus('Loading your repositories...', 'info', 0);

        const result = await apiRequest('/repos/list', 'POST', { token: currentToken });

        if (result && result.success) {
            allRepos = result.repos;
            filteredRepos = [...allRepos];

            updateStats();
            updateLanguageFilter();
            displayRepos();

            showStatus(`✅ Loaded ${allRepos.length} repositories`, 'success', 3000);
        }
    }

    // Update statistics
    function updateStats() {
        const stats = {
            total: allRepos.length,
            public: allRepos.filter(r => !r.private).length,
            private: allRepos.filter(r => r.private).length,
            totalStars: allRepos.reduce((sum, r) => sum + r.stargazers_count, 0),
            languages: new Set(allRepos.map(r => r.language).filter(Boolean)).size,
            totalSize: (allRepos.reduce((sum, r) => sum + r.size, 0) / 1024).toFixed(2)
        };

        const html = `
            <div class="stat-card">
                <div class="stat-number">${stats.total}</div>
                <div class="stat-label">Total Repositories</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.public}</div>
                <div class="stat-label">Public Repos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.private}</div>
                <div class="stat-label">Private Repos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">⭐ ${stats.totalStars.toLocaleString()}</div>
                <div class="stat-label">Total Stars</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.languages}</div>
                <div class="stat-label">Languages Used</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.totalSize} MB</div>
                <div class="stat-label">Total Size</div>
            </div>
        `;

        document.getElementById('statsContainer').innerHTML = html;
    }

    // Update language filter
    function updateLanguageFilter() {
        const languages = new Set(allRepos.map(r => r.language).filter(Boolean));
        const select = document.getElementById('filterLanguage');
        
        // Clear existing options except first
        while (select.options.length > 1) {
            select.remove(1);
        }

        Array.from(languages).sort().forEach(lang => {
            const option = document.createElement('option');
            option.value = lang;
            option.textContent = lang;
            select.appendChild(option);
        });
    }

    // Apply filters
    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const type = document.getElementById('filterType').value;
        const language = document.getElementById('filterLanguage').value;
        const sortBy = document.getElementById('sortBy').value;

        filteredRepos = allRepos.filter(repo => {
            const matchSearch = !search || 
                repo.name.toLowerCase().includes(search) || 
                (repo.description && repo.description.toLowerCase().includes(search));
            
            const matchType = !type || (type === 'public' ? !repo.private : repo.private);
            const matchLanguage = !language || repo.language === language;

            return matchSearch && matchType && matchLanguage;
        });

        // Sort
        const sortFunctions = {
            updated: (a, b) => new Date(b.updated_at) - new Date(a.updated_at),
            created: (a, b) => new Date(b.created_at) - new Date(a.created_at),
            name: (a, b) => a.name.localeCompare(b.name),
            stars: (a, b) => b.stargazers_count - a.stargazers_count,
            size: (a, b) => b.size - a.size
        };

        filteredRepos.sort(sortFunctions[sortBy]);
        displayRepos();
    }

    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('filterType').value = '';
        document.getElementById('filterLanguage').value = '';
        document.getElementById('sortBy').value = 'updated';
        applyFilters();
    }

    // Display repositories
    function displayRepos() {
        const container = document.getElementById('reposContainer');
        document.getElementById('repoCount').textContent = `${filteredRepos.length} repository${filteredRepos.length !== 1 ? 'ies' : ''}`;

        if (filteredRepos.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No repositories found</p></div>';
            return;
        }

        container.innerHTML = filteredRepos.map(repo => `
            <div class="repo-card">
                <div class="repo-header">
                    <div class="repo-title">
                        <span class="badge ${repo.private ? 'private' : 'public'}">${repo.private ? '🔒' : '🌐'}</span>
                        <span class="repo-name">${escapeHtml(repo.name)}</span>
                    </div>
                    <div class="repo-actions">
                        <a href="${repo.html_url}" target="_blank" style="text-decoration: none;">
                            <button class="btn-secondary btn-small">GitHub</button>
                        </a>
                        <button class="btn-danger btn-small" onclick="deleteRepo('${escapeAttr(repo.owner.login)}', '${escapeAttr(repo.name)}')">Delete</button>
                    </div>
                </div>

                ${repo.description ? `<p class="repo-description">${escapeHtml(repo.description)}</p>` : ''}

                <div class="repo-meta">
                    ${repo.language ? `<span class="meta-item"><span class="badge language">${repo.language}</span></span>` : ''}
                    <span class="meta-item">⭐ ${repo.stargazers_count.toLocaleString()}</span>
                    <span class="meta-item">🔀 ${repo.forks_count}</span>
                    <span class="meta-item">📏 ${(repo.size / 1024).toFixed(2)} MB</span>
                    <span class="meta-item">📅 ${new Date(repo.updated_at).toLocaleDateString()}</span>
                </div>
            </div>
        `).join('');
    }

    // Create repository
    async function createRepo() {
        const name = document.getElementById('repoName').value.trim();
        const desc = document.getElementById('repoDesc').value.trim();
        const isPrivate = document.getElementById('repoPrivate').value === 'true';

        if (!name) {
            showStatus('❌ Enter repository name', 'error');
            return;
        }

        if (!/^[a-zA-Z0-9._-]+$/.test(name)) {
            showStatus('❌ Invalid repository name', 'error');
            return;
        }

        const result = await apiRequest('/repos/create', 'POST', {
            token: currentToken,
            name: name,
            description: desc || null,
            private: isPrivate
        });

        if (result && result.success) {
            document.getElementById('repoName').value = '';
            document.getElementById('repoDesc').value = '';
            showStatus(`✅ Repository created!`, 'success', 3000);
            setTimeout(loadAllData, 1000);
        }
    }

    // Delete repository
    async function deleteRepo(owner, repo) {
        if (!confirm(`⚠️ Delete '${repo}'?\nThis cannot be undone!`)) return;

        const result = await apiRequest(`/repos/${owner}/${repo}`, 'DELETE', { token: currentToken });

        if (result && result.success) {
            showStatus(`✅ Repository deleted`, 'success', 2000);
            loadAllData();
        }
    }

    function refreshRepos() {
        loadAllData();
    }

    // Utilities
    function escapeHtml(text) {
        const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    function escapeAttr(text) {
        return text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }
</script>

</body>
</html>
